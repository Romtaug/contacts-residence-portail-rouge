name: Envoi mails prospection

# Lancement MANUEL depuis l'onglet "Actions" de GitHub (bouton "Run workflow").
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Mode d'envoi (test = tout sur TON adresse ; real = vrais contacts)"
        type: choice
        options:
          - test
          - real
        default: test

permissions:
  contents: write   # pour sauvegarder le suivi d'envoi en mode real

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Envoi des mails
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          if [ "${{ inputs.mode }}" = "real" ]; then
            python emailing/send.py --real
          else
            python emailing/send.py
          fi

      - name: Sauvegarder le suivi (mode real uniquement)
        if: ${{ inputs.mode == 'real' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add master/contacts_master.csv
          git commit -m "maj suivi envoi" || echo "rien a committer"
          git push || true
