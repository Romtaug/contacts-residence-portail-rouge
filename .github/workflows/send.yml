name: Envoi mails prospection

on:
  # Lancement manuel (test ou real)
  workflow_dispatch:
    inputs:
      mode:
        description: "Mode (test = sur ton adresse ; real = vrais contacts)"
        type: choice
        options:
          - test
          - real
        default: test
  # Lancement AUTOMATIQUE : le 25 de chaque mois à 07h00 UTC (~09h Paris l'été)
  schedule:
    - cron: "0 7 25 * *"

permissions:
  contents: write

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Envoi des mails
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            # Run mensuel automatique : envoi RÉEL + relance à tout le monde
            python emailing/send.py --real --resend-all
          elif [ "${{ inputs.mode }}" = "real" ]; then
            python emailing/send.py --real
          else
            python emailing/send.py
          fi

      - name: Sauvegarder le suivi
        if: ${{ github.event_name == 'schedule' || inputs.mode == 'real' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add master/contacts_master.csv
          git commit -m "maj suivi envoi" || echo "rien a committer"
          git push || true
